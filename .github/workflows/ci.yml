name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      run: npm test

    - name: Build Docker Image
      run: docker build -t cloudcredits_server .

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION \
        | docker login --username AWS --password-stdin 374549652874.dkr.ecr.us-east-1.amazonaws.com

    - name: Tag Image
      run: docker tag cloudcredits_server:latest 374549652874.dkr.ecr.us-east-1.amazonaws.com/cloudcredits_server:latest

    - name: Push to ECR
      run: docker push 374549652874.dkr.ecr.us-east-1.amazonaws.com/cloudcredits_server:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          docker pull 374549652874.dkr.ecr.us-east-1.amazonaws.com/cloudcredits_server:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 5000:4000 --name app 374549652874.dkr.ecr.us-east-1.amazonaws.com/cloudcredits_server:latest